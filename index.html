<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coo-King</title>
    <style>
        .hero-logo {
            max-width: 400px;
            animation: popIn 0.5s;
            filter: drop-shadow(2px 2px 5px rgba(0, 0, 0, 0.5));
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <img src="coo-king-logo.png" alt="Coo-King Logo" class="hero-logo">
</body>
</html>
